<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squadre - CY-LEAGUE</title>
    
    <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cards.css"> </head>
<body>
    
    <header>
        <div class="container header-content">
            <a href="index.html">
                <img src="img/logo.jpeg" alt="CY-LEAGUE Logo" class="logo-img">
            </a>
        </div>
        <nav>
            <a href="index.html">Classifica</a>
            <a href="partite.html">Partite</a>
            <a href="marcatori.html">Marcatori</a>
            <a href="squadre.html" class="active">Squadre</a>
            <a href="fantacalcio.html">Fantacalcio</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <h2>Le Squadre</h2>
            <p style="text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 20px;">
                💡 Clicca sui nomi per scoprire le figurine ufficiali dei giocatori!
            </p>
            
            <div id="elenco-squadre">
                <p>Caricamento squadre...</p>
            </div>
        </section>
    </main>

    <div id="player-modal" onclick="this.style.display='none'">
        
        <div class="panini-card" onclick="event.stopPropagation()">
            
            <div class="card-frame">
                <img id="modal-logo" src="" alt="Logo Squadra">
                <div id="modal-number" class="card-number-jersey"></div>
                <img id="modal-img" src="" alt="Foto Giocatore">
            </div>

            <div class="card-footer">
                <div id="modal-name"></div>
                <div id="modal-nickname"></div>
                <div id="modal-role"></div>
                <div id="modal-team"></div>
            </div>

        </div>
    </div>

    <script src="js/squadre.js"></script>

</body>
</html>
